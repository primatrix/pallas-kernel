# Configures the main branch to:
#   1. Require a pull request (no direct pushes).
#   2. Enforce rebase-only merges (merge commits and squash merges are disabled).
#
# Run this workflow once after the repository is created, and re-run it any time
# the settings need to be restored.  It requires a repository admin token, so
# you must provide a Personal Access Token (PAT) with "repo" and "admin:repo"
# scopes as the ADMIN_TOKEN repository secret.  The built-in GITHUB_TOKEN is
# not powerful enough to manage branch-protection rules.

name: Setup Branch Protection

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce rebase-only merges and protect main branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADMIN_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // ── 1. Repository-level merge settings ──────────────────────────
            // Allow ONLY rebase merges; disable merge commits and squash merges.
            await github.rest.repos.update({
              owner,
              repo,
              allow_merge_commit: false,
              allow_squash_merge: false,
              allow_rebase_merge: true,
            });
            core.info('Repository merge settings updated: rebase-only.');

            // ── 2. Branch protection for `main` ──────────────────────────────
            // • Require at least one approving review on every PR.
            // • Require linear history (rebase; no merge commits via the PR UI).
            // • Block force-pushes and branch deletion.
            // • Enforce rules for administrators as well.
            await github.rest.repos.updateBranchProtection({
              owner,
              repo,
              branch: 'main',
              required_status_checks: null,
              enforce_admins: true,
              required_pull_request_reviews: {
                required_approving_review_count: 1,
                dismiss_stale_reviews: false,
                require_code_owner_reviews: false,
              },
              restrictions: null,
              required_linear_history: true,
              allow_force_pushes: false,
              allow_deletions: false,
            });
            core.info('Branch protection for `main` applied successfully.');
